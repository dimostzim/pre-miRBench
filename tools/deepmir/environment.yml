name: deepmir
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - openjdk=8
  - numpy>=1.20,<1.24
  - pip
  - pip:
      - tensorflow==2.6.0
      - keras==2.6.0
      - h5py
      - pyfaidx
      - imageio
      - xlrd
      - scikit-learn
      - matplotlib
      - pandas
      - protobuf==3.20.*
